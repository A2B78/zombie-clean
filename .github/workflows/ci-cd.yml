# ======================================================
# PipelineAI - Generated GitHub Actions Workflow
# Repo:  A2B78/zombie-clean
# Stack: unknown (unknown)
# ======================================================
# 
# SECRETS NÉCESSAIRES dans ton repo GitHub:
# (Settings > Secrets and variables > Actions)
#
# DOCKERHUB_USERNAME → Ton username Docker Hub
# DOCKERHUB_TOKEN    → Ton token Docker Hub
# DEPLOY_HOST       → IP ou domaine de ton VPS (ex: 1.2.3.4)
# DEPLOY_USER       → Utilisateur SSH (ex: deploy)
# DEPLOY_SSH_KEY    → Clé SSH privée (cat ~/.ssh/id_rsa | base64)
# DEPLOY_PATH       → Chemin de déploiement (ex: /opt/zombie-clean)
# ======================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

# Évite de lancer plusieurs fois le même workflow pour un même commit
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/zombie-clean
  REGISTRY: docker.io

jobs:
  # ── 1. Tests ──────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4



      - name: Lint check
        run: echo "No tests configured - add test script to enable"

  # ── 2. Build & Push Docker ────────────────────
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy ─────────────────────────────────
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/zombie-clean' }}
            
            # Pull latest image
            echo ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }} | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/zombie-clean:latest
            
            # Blue-green deploy
            docker stop zombie-clean-old 2>/dev/null || true
            docker rename zombie-clean zombie-clean-old 2>/dev/null || true
            
            docker run -d \
              --name zombie-clean \
              --restart unless-stopped \
              --env-file .env \
              -p 3000:3000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/zombie-clean:latest
            
            # Health check
            sleep 5
            docker inspect --format='{{.State.Status}}' zombie-clean | grep -q running
            
            # Cleanup old
            docker rm -f zombie-clean-old 2>/dev/null || true
            docker image prune -f

      - name: Run DB migrations
        if: success()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker exec zombie-clean echo "No migrations" || true

      - name: Notify PipelineAI
        if: always()
        uses: peter-evans/repository-dispatch@v3
        with:
          event-type: deployment-status
          client-payload: |
            {
              "status": "${{ job.status }}",
              "commit": "${{ github.sha }}",
              "actor": "${{ github.actor }}",
              "project": "zombie-clean"
            }
